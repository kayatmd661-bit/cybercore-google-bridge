name: "CyberCore Google Home Bridge"
version: "1.0.1"
slug: "cybercore_google_bridge"
description: "High-performance smart bridge linking Home Assistant with Google Home via Firebase Realtime Database"
url: "https://github.com/your-username/your-repo"
arch:
  - aarch64
  - amd64
  - armv7
init: false
options:
  FIREBASE_URL: "https://your-firebase-database.firebaseio.com"
  AGENT_SECRET_TOKEN: "your_firebase_secret_auth_token"
schema:
  FIREBASE_URL: str
  AGENT_SECRET_TOKEN: str
environment:
  EXPOSED_DOMAINS: "light,fan,switch,input_boolean,sensor,binary_sensor,camera,cover,media_player,climate,lock,vacuum,scene,script,humidifier,water_heater,air_purifier,alarm_control_panel,remote,number,select,valve,lawn_mower"
